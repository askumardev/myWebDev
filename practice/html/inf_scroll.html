<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Infinite Scroll</title>
    <link rel="stylesheet" href="css/inf_scroll.css" />
  </head>

  <body>
    <header>
      <h1>Infinite Scroll Page</h1>
    </header>

    <div id="content"></div>

    <footer class="footer">
      <div class="footer-text">Demo Footer</div>

      <button id="scrollTopBtn">
        <img src="../images/up-arrow.png" alt="scroll top" />
      </button>
    </footer>

    <script type="text/javascript" src="../js/inf_scroll.js"></script>
  </body>
</html>
